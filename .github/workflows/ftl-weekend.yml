name: FTL Weekend Digest

on:
  # Thursday 13:00 UTC = 9 AM EDT (Mar–Nov) / 8 AM EST (Nov–Mar).
  # GitHub Actions cron is UTC-only (no DST handling), so we pick a UTC time
  # that lands firmly in Fort Lauderdale morning year-round.
  schedule:
    - cron: "0 13 * * 4"
  workflow_dispatch: {}

concurrency:
  group: ftl-weekend
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute upcoming weekend window (America/New_York)
        id: weekend
        run: |
          # Target the upcoming Fri–Sun in Fort Lauderdale local time.
          TZ=America/New_York
          export TZ
          DOW=$(date +%u)   # 1=Mon ... 7=Sun
          # Days from today to Fri. Mon(1)→4, Thu(4)→1, Fri(5)→0, Sat(6)→-1, Sun(7)→-2.
          FRI_OFFSET=$((5 - DOW))
          FRI=$(date -d "today + ${FRI_OFFSET} days" +%Y-%m-%d)
          SUN=$(date -d "today + $((FRI_OFFSET + 2)) days" +%Y-%m-%d)
          HUMAN="$(date -d "$FRI" "+%a %b %-d") – $(date -d "$SUN" "+%a %b %-d")"
          echo "fri=$FRI"     >> "$GITHUB_OUTPUT"
          echo "sun=$SUN"     >> "$GITHUB_OUTPUT"
          echo "human=$HUMAN" >> "$GITHUB_OUTPUT"
          echo "Today (ET): $(date +%Y-%m-%d\ %A)  →  Target weekend: $HUMAN ($FRI to $SUN)"

      - name: Curate weekend events with Claude Code
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          max_turns: "60"
          allowed_tools: "Bash,Write,WebSearch,WebFetch"
          prompt: |
            Find interesting events happening this upcoming weekend (${{ steps.weekend.outputs.human }}, i.e. ${{ steps.weekend.outputs.fri }} through ${{ steps.weekend.outputs.sun }}) in the greater Fort Lauderdale area.

            Cities to cover: Fort Lauderdale, Hollywood, Pompano Beach, Dania Beach, Plantation, Sunrise, Davie, Wilton Manors, Oakland Park, Las Olas, downtown FTL, the beach area. HARD EXCLUDE anything in Miami, South Beach, Coral Gables, Miami Beach, or Brickell — those are NOT greater Fort Lauderdale.

            INCLUDE:
            - Car shows / cars & coffee meetups
            - Comedy shows (stand-up, improv)
            - Theater / stage performances / plays / musicals
            - Festivals, fairs, street markets
            - Grand openings of restaurants, shops, or venues (like the recent Smorgasbord FTL opening)
            - Art walks, gallery openings, museum exhibits
            - Food events (food truck rallies, tasting events, pop-ups)
            - Cultural events, fireworks, parades, unique one-off happenings

            EXCLUDE:
            - Concerts, DJ nights, music festivals, tribute bands, live music events
            - Bar events, club nights, happy hours, wine/beer/cocktail tasting parties
            - Anything primarily centered on drinking or live music

            BUDGET: run AT MOST 5 WebSearch queries and AT MOST 3 WebFetch calls before writing events.json. Good starter queries:
            - "things to do Fort Lauderdale weekend ${{ steps.weekend.outputs.fri }}"
            - "Fort Lauderdale car show ${{ steps.weekend.outputs.fri }}"
            - "Fort Lauderdale Improv comedy ${{ steps.weekend.outputs.fri }}"
            - "Fort Lauderdale grand opening ${{ steps.weekend.outputs.fri }}"
            - "Broward festivals markets this weekend"
            Prefer WebSearch result snippets over WebFetch. Only fetch a page if the snippets don't give you a specific event URL.

            For EACH event, require ALL of: name, start time, venue, location (city in greater FTL), description, and a SPECIFIC event/ticket URL that deep-links to that event (NOT a generic venue calendar). Drop any event missing any of these. Do not invent details.

            IMPORTANT: as soon as you have 5-8 solid events, STOP searching and WRITE events.json. A small accurate list beats a larger one with weak entries.

            OUTPUT: write `events.json` to the repo root (use the Write tool) as a JSON array. Each element:

              {
                "category": "Car shows" | "Comedy" | "Theater" | "Grand openings" | "Festivals" | "Food" | "Art" | "Other",
                "emoji": "🚗" | "🎤" | "🎭" | "🎉" | "🎪" | "🍴" | "🎨" | "📌",
                "name": "Short event name (≤ 60 chars)",
                "when": "Fri May 1, 7:00 PM ET",
                "where": "Venue name · City, FL",
                "what": "One sentence, ≤ 140 chars",
                "url": "https://specific-event-page"
              }

            Rules:
            - 5 to 10 events total.
            - Every "url" must be distinct AND specific to its event. No two events share a URL.
            - Do NOT include events outside greater Fort Lauderdale (no Miami, South Beach, etc.).
            - Do NOT include concerts, tribute bands, or music-centered events.
            - "when" includes day of week, date, start time, and "ET".
            - Write ONLY valid JSON to events.json — no comments, no code fences, no prose.

            When events.json is written and parses as valid JSON, reply with just "DONE" — nothing else.

      - name: Validate events.json
        run: |
          if [ ! -s events.json ]; then
            echo "::error::events.json is missing or empty"
            ls -la
            exit 1
          fi
          if ! jq empty events.json; then
            echo "::error::events.json is not valid JSON"
            cat events.json
            exit 1
          fi
          COUNT=$(jq 'length' events.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Curated $COUNT events"
        id: validate

      - name: Render HTML digest into ./site
        env:
          HUMAN: ${{ steps.weekend.outputs.human }}
          FRI: ${{ steps.weekend.outputs.fri }}
          SUN: ${{ steps.weekend.outputs.sun }}
        run: |
          mkdir -p site
          GENERATED_AT=$(TZ=America/New_York date "+%a %b %-d, %-I:%M %p ET")

          # Body of the page: events grouped by category, in JSON's order.
          # Use jq to emit per-event HTML blocks; bash to wrap in HTML shell.
          EVENTS_HTML=$(jq -r '
            group_by(.category)
            | map({category: .[0].category, emoji: .[0].emoji, items: .})
            | .[]
            | "<section class=\"cat\">"
              + "<h2>" + (.emoji // "") + " " + .category + "</h2>"
              + "<ul>"
              + ([.items[] |
                  "<li><a href=\"" + .url + "\" target=\"_blank\" rel=\"noopener\">"
                  + "<div class=\"name\">" + .name + "</div>"
                  + "<div class=\"meta\">" + .when + " · " + .where + "</div>"
                  + "<div class=\"desc\">" + .what + "</div>"
                  + "</a></li>"
                ] | join("\n"))
              + "</ul>"
              + "</section>"
          ' events.json)

          cat > site/index.html <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <meta name="robots" content="noindex">
          <title>FTL Weekend — ${HUMAN}</title>
          <style>
            :root {
              --bg: #0f1115; --panel: #161922; --line: #262b36;
              --text: #e9ecf1; --muted: #9aa3b2; --accent: #6cb6ff;
            }
            @media (prefers-color-scheme: light) {
              :root { --bg:#fafafa; --panel:#fff; --line:#e5e7eb; --text:#101418; --muted:#5b6573; --accent:#0a66c2; }
            }
            * { box-sizing: border-box; }
            html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
              font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
            .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 64px; }
            header h1 { font-size: 22px; margin: 0 0 4px; }
            header .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
            section.cat { margin: 24px 0; }
            section.cat h2 { font-size: 18px; margin: 0 0 8px; padding-bottom: 6px;
              border-bottom: 1px solid var(--line); }
            ul { list-style: none; padding: 0; margin: 0; }
            li { margin: 0 0 10px; }
            li a { display: block; padding: 14px 16px; background: var(--panel);
              border: 1px solid var(--line); border-radius: 12px;
              color: var(--text); text-decoration: none; transition: border-color .15s; }
            li a:active, li a:hover { border-color: var(--accent); }
            .name { font-weight: 600; font-size: 16px; }
            .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
            .desc { font-size: 14px; margin-top: 6px; }
            footer { color: var(--muted); font-size: 12px; margin-top: 32px; text-align: center; }
            footer a { color: var(--muted); }
          </style>
          </head>
          <body>
            <div class="wrap">
              <header>
                <h1>Greater Fort Lauderdale — ${HUMAN}</h1>
                <div class="sub">Tap any event to open its page · Generated ${GENERATED_AT}</div>
              </header>
              ${EVENTS_HTML}
              <footer>
                Auto-curated weekly · <a href="https://github.com/dangershuny/ftl-weekend-digest" target="_blank" rel="noopener">source</a>
              </footer>
            </div>
          </body>
          </html>
          HTML

          echo "Generated site/index.html ($(wc -c < site/index.html) bytes)"
          head -c 300 site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Push single ntfy notification
        env:
          NTFY_TOPIC: daniel-weekly-notifications-1993
          HUMAN: ${{ steps.weekend.outputs.human }}
          COUNT: ${{ steps.validate.outputs.count }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          BODY=$(printf '%s events curated for %s.\n\nTap to open the digest — every event has its own tappable link.' "$COUNT" "$HUMAN")
          curl -sS --fail \
            -H "Title: FTL Weekend — $HUMAN" \
            -H "Tags: calendar" \
            -H "Priority: default" \
            -H "Click: $PAGE_URL" \
            -H "Content-Type: text/plain; charset=utf-8" \
            --data "$BODY" \
            "https://ntfy.sh/$NTFY_TOPIC"
          echo
          echo "Sent 1 notification → $PAGE_URL"
